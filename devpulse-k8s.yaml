apiVersion: apps/v1
kind: Deployment
metadata:
  name: devpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devpulse
  template:
    metadata:
      labels:
        app: devpulse
    spec:
      nodeSelector:
        kubernetes.io/hostname: colima
      containers:
      - name: devpulse
        image: 100.125.202.56:5000/devpulse:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: devpulse-service
spec:
  type: NodePort
  selector:
    app: devpulse
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
