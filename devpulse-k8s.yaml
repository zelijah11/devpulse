apiVersion: apps/v1
kind: Deployment
metadata:
  name: devpulse
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devpulse
  template:
    metadata:
      labels:
        app: devpulse
    spec:
      containers:
        - name: devpulse
          image: 100.67.240.124:30500/devpulse:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: devpulse
  namespace: default
spec:
  type: NodePort
  selector:
    app: devpulse
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
